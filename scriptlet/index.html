<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Wallpapers</title>
  <script>
    // Set root font size from device DPI before stylesheet applies, else the 44px fallback wins.
    var ppi = kindle.device.getCSSPixelsPerInch();
    if (ppi > 0) document.documentElement.style.fontSize = (ppi * 0.15) + "px";
  </script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    html,
    body {
      height: 100%;
    }

    html {
      font-size: 44px;
    }

    body {
      font-family: sans-serif;
      background: #fff;
      color: #000;
      text-align: center;
    }

    /* Table layout for vertical centering — reliable on the old WebKit. */
    .wrap {
      width: 100%;
      height: 100%;
      border-collapse: collapse;
    }

    .cell {
      vertical-align: middle;
    }

    .hide {
      display: none;
    }

    .stack>*+* {
      margin-top: 0.8em;
    }

    img.qr {
      display: block;
      width: 15em;
      height: 15em;
      margin: 0 auto;
    }

    .url {
      font: 0.75em monospace;
      color: #444;
      word-wrap: break-word;
    }

    .note {
      line-height: 1.3;
    }

    .note.big {
      font-size: 1.4em;
    }

    button {
      font-size: 1em;
      padding: 0.65em 1.3em;
      background: #000;
      color: #fff;
      border: 0;
    }

    h1 {
      font-size: 1.8em;
    }
  </style>
</head>

<body>
  <table class="wrap">
    <tr>
      <td class="cell">
        <div class="stack">
          <div id="share" class="stack hide">
            <img class="qr" alt="QR">
            <div class="url"></div>
            <div class="note">
              Scan the QR or open the URL<br>
              on a phone on the same wifi.
            </div>
          </div>
          <div id="status-waiting" class="note">Waiting for wifi</div>
          <h1 id="status-unreachable" class="hide">Server unreachable</h1>
          <div class="note big hide" id="need-wifi">need wifi</div>
          <button id="stop" type="button">Stop server</button>
        </div>
      </td>
    </tr>
  </table>
  <script>
    function setHidden(id, hidden) {
      var el = document.getElementById(id);
      el.className = el.className.replace(/\s*\bhide\b/, "") + (hidden ? " hide" : "");
    }

    function wifiOn() {
      try {return kindle.net.getWirelessState() === "on";}
      catch (_) {return true;}
    }

    var currentUrl = "";
    function showShare(url) {
      if (url !== currentUrl) {
        currentUrl = url;
        document.querySelector(".url").textContent = url;
        document.querySelector(".qr").src = "http://127.0.0.1:{{PORT}}/{{TOK}}/qr?t=" + Date.now();
      }
      setHidden("status-waiting", true);
      setHidden("status-unreachable", true);
      setHidden("share", false);
      setHidden("stop", false);
    }

    function showWaiting() {
      currentUrl = "";
      setHidden("share", true);
      setHidden("status-unreachable", true);
      setHidden("status-waiting", false);
      setHidden("stop", false);
    }

    function showUnreachable() {
      currentUrl = "";
      setHidden("share", true);
      setHidden("status-waiting", true);
      setHidden("status-unreachable", false);
      setHidden("stop", true);
    }

    function updateWifiHint() {setHidden("need-wifi", wifiOn());}

    function poll() {
      updateWifiHint();
      var x = new XMLHttpRequest();
      x.open("GET", "http://127.0.0.1:{{PORT}}/{{TOK}}/url", true);
      x.timeout = 2000;
      x.onload = function () {
        if (x.status !== 200) {showUnreachable(); return;}
        var body = (x.responseText || "").replace(/\s+$/, "");
        if (/^https?:\/\//.test(body)) showShare(body);
        else showWaiting();
      };
      x.onerror = showUnreachable;
      x.ontimeout = showUnreachable;
      x.send();
      setTimeout(poll, 1500);
    }
    updateWifiHint();
    setTimeout(poll, 500);

    document.getElementById("stop").addEventListener("click", function () {
      try {
        var x = new XMLHttpRequest();
        x.open("POST", "http://127.0.0.1:{{PORT}}/kill", true);
        x.send();
      } catch (_e) { }
    });
  </script>
</body>

</html>
